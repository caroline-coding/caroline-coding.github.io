<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Serif Pro', Georgia, serif;
            font-size: 19px;
            line-height: 1.7;
            color: #1a1a1a;
            background: #fafafa;
            padding: 4rem 1.5rem;
            min-height: 100vh;
        }

        main {
            max-width: 650px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 3rem;
        }

        .projects {
            list-style: none;
        }

        .projects li {
            padding: 0.75rem 0;
            border-bottom: 1px solid #e5e5e5;
        }

        .projects li:last-child {
            border-bottom: none;
        }

        .projects a {
            color: #0d7377;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .projects a:hover {
            color: #095255;
        }

        .projects .desc {
            color: #666;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <main>
        <h1>Projects</h1>
        <ul class="projects">
            <li>
                <a href="/taboo-game/">Taboo</a>
                <span class="desc"> &mdash; self-explanatory</span>
            </li>
            <li>
                <a href="/ridiculous-word-generator/">Ridiculous Word Generator</a>
                <span class="desc"> &mdash; generates random words for word games</span>
            </li>
            <li>
                <a href="/climate-website/">Climate Compensation Simulator</a>
                <span class="desc"> &mdash; some of what I've been working on for my job</span>
            </li>
            <li>
                <a href="/get-fit-2026/">Fitness Tracker</a>
                <span class="desc"> &mdash; for my annual family fitness challenge</span>
            </li>
        </ul>
    </main>
</body>
</html>
